<div class="station-card-container">
    <div tuiIsland class="station-island">
        <h3 class="tui-island__title">{{ stationName() }}</h3>
        
        <div class="tui-island__content">
            <div class="temperature-section">
                <span class="label">Temp. Actual:</span>
                <tui-badge 
                    [appearance]="temperature() > 200 ? 'error' : 'info'"
                    class="temp-badge">
                    {{ temperature() }}°C
                </tui-badge>
            </div>

            <div class="actions-section">
                <button
                    tuiButton
                    appearance="secondary-destructive"
                    size="s"
                    class="action-btn"
                    (click)="onTurnOffClick()">
                    Apagar Estación
                </button>
                
                <button
                    tuiButton
                    appearance="primary"
                    size="s"
                    class="action-btn"
                    (click)="onCookClick()">
                    Cocinar Pato (5s)
                </button>
            </div>
        </div>
    </div>
</div>
