<div class="pos-container">
  <!-- Header -->
  <header class="pos-header">
    <div class="title-area">
      <h1>Punto de Venta</h1>
      <span class="badge">Mesa Activa: {{currentOrderId}}</span>
    </div>
    <p>Selecciona un plato para enviarlo a la cocina.</p>
  </header>

  <div class="pos-content">
    <!-- Grid de Platos -->
    <div class="dishes-grid">
      <div class="dish-card" *ngFor="let dish of dishes()" (click)="selectDish(dish)">
        <div class="dish-image-wrapper">
          <div class="dish-image" [style.backgroundImage]="'url(' + dish.imageUrl + ')'"></div>
        </div>
        <div class="dish-info">
          <span class="category">{{dish.category}}</span>
          <h3>{{dish.name}}</h3>
          <p class="description">{{dish.description}}</p>
          <div class="price-tag">
            <div class="price">{{dish.price}}</div>
            <div class="add-icon">＋</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel Lateral (Drawer) para personalizar plato -->
  <div class="side-panel-overlay" [class.open]="selectedDish() !== null" (click)="closePanel()"></div>
  <aside class="side-panel" [class.open]="selectedDish() !== null">
    <div class="panel-header" *ngIf="selectedDish() as dish">
      <button class="close-btn" (click)="closePanel()">✕</button>
      <h2>Personalizar</h2>
    </div>

    <div class="panel-content" *ngIf="selectedDish() as dish">
      <div class="selected-dish-preview">
        <div class="preview-img" [style.backgroundImage]="'url(' + dish.imageUrl + ')'"></div>
        <div class="preview-text">
          <h3>{{dish.name}}</h3>
          <span class="price">${{dish.price}}</span>
        </div>
      </div>

      <form [formGroup]="orderForm" (ngSubmit)="onSubmit()" class="customization-form">
        <div class="form-group">
          <label for="quantity">Cantidad del pedido</label>
          <input type="number" id="quantity" formControlName="quantity" min="1">
        </div>

        <div class="form-group">
          <label for="notes">Instrucciones especiales</label>
          <textarea id="notes" formControlName="notes" rows="4" placeholder="Ej: Sin sal, término medio..."></textarea>
        </div>

        <div class="panel-actions">
          <button type="button" class="btn-cancel" (click)="closePanel()">Volver</button>
          <button type="submit" class="btn-submit" [disabled]="orderForm.invalid || isSubmitting()">
            <span *ngIf="!isSubmitting()">Confirmar Pedido</span>
            <span *ngIf="isSubmitting()">Enviando...</span>
          </button>
        </div>
      </form>
    </div>
  </aside>

  <!-- Notificaciones Toasts -->
  <div class="toast-container">
    <div class="toast" *ngFor="let notif of notifications()" [ngClass]="notif.type">
      <div class="toast-icon">
        <span *ngIf="notif.type === 'success'">✓</span>
        <span *ngIf="notif.type === 'error'">!</span>
      </div>
      <div class="toast-message">{{notif.message}}</div>
    </div>
  </div>
</div>
